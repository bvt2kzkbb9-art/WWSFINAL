<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Profil — Weekend Warrior Social</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-container">
  <header class="top-bar">
    <div class="top-bar-left"><h1 class="app-title">👤 Mój Profil</h1></div>
    <nav class="top-bar-right">
      <button id="logout-btn" class="icon-btn" aria-label="Wyloguj">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5m0 0l-5-5"/>
        </svg>
      </button>
    </nav>
  </header>

  <main class="main-content">
    <div class="page-container">
      <div class="profile-header">
        <div class="profile-avatar-lg" id="profile-avatar">⚔️</div>
        <h2 id="profile-name" class="profile-name">Wojownik</h2>
        <p id="profile-username" class="profile-username">@wojownik</p>
      </div>

      <section class="section">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number" id="stat-level">1</div>
            <div class="stat-name">Poziom</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-xp">0</div>
            <div class="stat-name">XP</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-rank">Rookie</div>
            <div class="stat-name">Ranga</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-posts">0</div>
            <div class="stat-name">Posty</div>
          </div>
        </div>
      </section>

      <section class="section">
        <h3 class="section-title">O mnie</h3>
        <textarea id="profile-bio" class="input" placeholder="Napisz coś o sobie..." style="height: 80px;"></textarea>
        <button id="save-bio-btn" class="btn btn-primary" style="margin-top: 1rem;">Zapisz</button>
      </section>

      <section class="section">
        <h3 class="section-title">🏅 Osiągnięcia</h3>
        <div id="achievements-list" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;"></div>
      </section>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏰</span><span class="nav-label">Arena</span></a>
    <a href="feed.html" class="nav-item"><span class="nav-icon">📜</span><span class="nav-label">Kroniki</span></a>
    <a href="challenges.html" class="nav-item nav-hero"><span class="nav-icon">⚔️</span><span class="nav-label">Misje</span></a>
    <a href="ranking.html" class="nav-item"><span class="nav-icon">🏆</span><span class="nav-label">Chwała</span></a>
  </nav>
</div>

<script type="module">
  
  import { db, COL } from './js/firebase.js';
  import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { loginWithEmail, loginWithGoogle } from './js/auth.js';
  checkAuth((user, userData) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    // Załaduj dane profilu
    document.getElementById('profile-name').textContent = userData.displayName || 'Wojownik';
    document.getElementById('profile-username').textContent = '@' + (userData.username || user.email.split('@')[0]);
    document.getElementById('stat-level').textContent = userData.level || 1;
    document.getElementById('stat-xp').textContent = userData.points || 0;
    document.getElementById('stat-rank').textContent = userData.rank || 'Rookie';
    document.getElementById('stat-posts').textContent = userData.postsCount || 0;
    document.getElementById('profile-bio').value = userData.bio || '';
    
    const avatar = (userData.displayName || 'W').charAt(0).toUpperCase();
    document.getElementById('profile-avatar').textContent = avatar;

    // Osiągnięcia
    const achievementsContainer = document.getElementById('achievements-list');
    const achievements = ['🏅', '⭐', '🎖️', '🏆', '💎', '🔥', '⚔️', '👑'];
    achievementsContainer.innerHTML = achievements.map(a => `<div style="font-size: 32px; text-align: center;">${a}</div>`).join('');

    // Zapisz bio
    document.getElementById('save-bio-btn').addEventListener('click', async () => {

        showToast('✅ Bio zaktualizowane', 'success');
      } catch (err) {
        showToast('❌ Błąd', 'error');
      }
    });
  });

  // Wylogowanie
  document.getElementById('logout-btn').addEventListener('click', () => {
    logout();
  });
</script>
</body>
</html>
