<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Logowanie — Weekend Warrior Social</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body style="background: var(--bg-primary); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem;">

<div style="width: 100%; max-width: 400px;">
  <div style="background: linear-gradient(135deg, var(--bg-card), var(--bg-tertiary)); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 2rem; text-align: center;">
    
    <h1 style="font-size: 32px; margin-bottom: 1rem;">⚔️</h1>
    <h2 style="font-size: 24px; color: var(--gold-light); margin-bottom: 0.5rem;">Arena Wojowników</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Dołącz. Walcz. Zwyciężaj.</p>

    <form id="login-form" style="display: flex; flex-direction: column; gap: 1rem;">
      <input type="email" id="email" placeholder="Email" required style="padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--gold-dark); border-radius: 8px; color: var(--text-primary); font-size: 16px;"/>
      <input type="password" id="password" placeholder="Hasło" required style="padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--gold-dark); border-radius: 8px; color: var(--text-primary); font-size: 16px;"/>
      <button type="submit" style="padding: 12px; background: linear-gradient(135deg, var(--gold-primary), var(--gold-light)); color: var(--bg-primary); border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px;">Zaloguj się</button>
    </form>

    <div style="margin: 1.5rem 0; position: relative;">
      <div style="border-top: 1px solid var(--gold-dark);"></div>
      <span style="position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--bg-card); padding: 0 0.5rem; color: var(--text-muted); font-size: 12px;">lub</span>
    </div>

    <button id="google-btn" type="button" style="padding: 12px; background: #db4437; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; width: 100%;">🔵 Google</button>

    <p style="margin-top: 1.5rem; color: var(--text-secondary); font-size: 14px;">
      Nie masz konta? <a href="register.html" style="color: var(--gold-light);">Zarejestruj się</a>
    </p>
  </div>
</div>

<script type="module">
  import { loginWithEmail, loginWithGoogle, checkAuth } from './js/auth.js';

  checkAuth((user) => {
    if (user) window.location.href = 'index.html';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await loginWithEmail(
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      window.location.href = 'index.html';
    } catch (err) {}
  });

  document.getElementById('google-btn').addEventListener('click', async () => {
    try {
      await loginWithGoogle();
      window.location.href = 'index.html';
    } catch (err) {}
  });
</script>
</body>
</html>
