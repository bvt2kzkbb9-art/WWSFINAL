<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Misje — Weekend Warrior Social</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-container">
  <header class="top-bar">
    <div class="top-bar-left"><h1 class="app-title">⚔️ Misje</h1></div>
    <nav class="top-bar-right">
      <a href="profile.html" class="avatar-btn" id="top-avatar">⚔️</a>
    </nav>
  </header>

  <main class="main-content">
    <div class="page-container">
      <!-- TABS -->
      <section class="section">
        <div class="tabs">
          <button class="tab-btn active" data-tab="available">🎯 Dostępne</button>
          <button class="tab-btn" data-tab="received">📥 Odebrane</button>
          <button class="tab-btn" data-tab="sent">📤 Wysłane</button>
          <button class="tab-btn" data-tab="completed">✅ Ukończone</button>
        </div>
      </section>

      <!-- CONTENT -->
      <div id="challenges-content"></div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏰</span><span class="nav-label">Arena</span></a>
    <a href="feed.html" class="nav-item"><span class="nav-icon">📜</span><span class="nav-label">Kroniki</span></a>
    <a href="challenges.html" class="nav-item nav-hero active"><span class="nav-icon">⚔️</span><span class="nav-label">Misje</span></a>
    <a href="ranking.html" class="nav-item"><span class="nav-icon">🏆</span><span class="nav-label">Chwała</span></a>
  </nav>
</div>

<script type="module">
  import { checkAuth } from './js/auth.js';
  import { loadChallenges } from './js/challenges.js';

  checkAuth((user) => {
    if (!user) window.location.href = 'login.html';
    else loadChallenges();
  });
</script>
</body>
</html>
